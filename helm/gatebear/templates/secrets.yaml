{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backend.secretName }}
  labels:
    {{- include "gatebear.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.backend.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.aiBackend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.aiBackend.secretName }}
  labels:
    {{- include "gatebear.aiBackend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.aiBackend.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
