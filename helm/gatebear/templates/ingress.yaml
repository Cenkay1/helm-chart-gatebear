{{- if .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gatebear.fullname" . }}
  labels:
    {{- include "gatebear.labels" . | nindent 4 }}
  {{- with .Values.frontend.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.frontend.ingress.className }}
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- end }}
  {{- if .Values.frontend.ingress.tls }}
  tls:
    {{- range .Values.frontend.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.frontend.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # Frontend paths
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "gatebear.frontend.fullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
          {{- end }}
          # Backend API paths
          {{- if $.Values.backend.enabled }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "gatebear.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
          {{- end }}
          # AI Backend paths
          {{- if $.Values.aiBackend.enabled }}
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: {{ include "gatebear.aiBackend.fullname" $ }}
                port:
                  number: {{ $.Values.aiBackend.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
