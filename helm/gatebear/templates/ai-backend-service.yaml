{{- if .Values.aiBackend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gatebear.aiBackend.fullname" . }}
  labels:
    {{- include "gatebear.aiBackend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.aiBackend.service.type }}
  ports:
    - port: {{ .Values.aiBackend.service.port }}
      targetPort: {{ .Values.aiBackend.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "gatebear.aiBackend.selectorLabels" . | nindent 4 }}
{{- end }}
