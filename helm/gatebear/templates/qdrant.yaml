{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gatebear.qdrant.fullname" . }}
  labels:
    {{- include "gatebear.qdrant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "gatebear.qdrant.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "gatebear.qdrant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gatebear.qdrant.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 6333
              protocol: TCP
            - name: grpc
              containerPort: 6334
              protocol: TCP
          {{- if .Values.qdrant.persistence.enabled }}
          volumeMounts:
            - name: storage
              mountPath: {{ .Values.qdrant.persistence.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.qdrant.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes:
          - {{ .Values.qdrant.persistence.accessMode }}
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gatebear.qdrant.fullname" . }}
  labels:
    {{- include "gatebear.qdrant.labels" . | nindent 4 }}
spec:
  type: {{ .Values.qdrant.service.type }}
  ports:
    - port: {{ .Values.qdrant.service.port }}
      targetPort: 6333
      protocol: TCP
      name: http
    - port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: 6334
      protocol: TCP
      name: grpc
  selector:
    {{- include "gatebear.qdrant.selectorLabels" . | nindent 4 }}
{{- end }}
