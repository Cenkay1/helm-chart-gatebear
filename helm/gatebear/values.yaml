# GateBear Helm Chart Values
# Single values file for all components

# =============================================================================
# GLOBAL CONFIGURATION
# =============================================================================
global:
  # Image pull secrets for private registries
  imagePullSecrets: []
  # Storage class for persistent volumes
  storageClass: ""
  # Node selector for all pods
  nodeSelector: {}
  # Tolerations for all pods
  tolerations: []
  # Affinity rules for all pods
  affinity: {}

# =============================================================================
# FRONTEND CONFIGURATION
# =============================================================================
frontend:
  enabled: true
  replicaCount: 2

  image:
    repository: gatebear/frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    hosts:
      - host: gatebear.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: gatebear-tls
    #    hosts:
    #      - gatebear.example.com

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  env:
    REACT_APP_API_URL: "http://gatebear.example.com/api/v1"
    REACT_APP_AI_API_URL: "http://gatebear.example.com/ai"

  # Health checks
  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5

# =============================================================================
# BACKEND API CONFIGURATION
# =============================================================================
backend:
  enabled: true
  replicaCount: 2

  image:
    repository: gatebear/backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    hosts:
      - host: gatebear.example.com
        paths:
          - path: /api
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  env:
    DEBUG: "false"
    CORS_ORIGINS: "*"
    ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    REFRESH_TOKEN_EXPIRE_DAYS: "7"

  # Secrets - reference to Kubernetes secret
  secretName: gatebear-backend-secrets
  secrets:
    SECRET_KEY: "change-this-to-a-secure-secret-key"
    MONGODB_URL: "mongodb://mongodb:27017"
    DATABASE_NAME: "gatebear"
    # SMTP Settings
    SMTP_HOST: ""
    SMTP_PORT: "587"
    SMTP_USER: ""
    SMTP_PASSWORD: ""
    SMTP_FROM: ""
    SMTP_TLS: "true"

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5

# =============================================================================
# AI BACKEND CONFIGURATION (RAG Chatbot)
# =============================================================================
aiBackend:
  enabled: true
  replicaCount: 1

  image:
    repository: gatebear/ai-backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8001
    targetPort: 8001

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    hosts:
      - host: gatebear.example.com
        paths:
          - path: /ai
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  env:
    MODEL_NAME: "gemini-1.5-flash"
    EMBEDDING_MODEL: "all-MiniLM-L6-v2"
    QDRANT_HOST: "qdrant"
    QDRANT_PORT: "6333"
    COLLECTION_NAME: "gatebear_docs"

  # Secrets
  secretName: gatebear-ai-secrets
  secrets:
    GEMINI_API_KEY: ""

  # Persistent storage for vector database
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    mountPath: /app/data

  livenessProbe:
    httpGet:
      path: /
      port: 8001
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /
      port: 8001
    initialDelaySeconds: 30
    periodSeconds: 10

# =============================================================================
# MONGODB CONFIGURATION
# =============================================================================
mongodb:
  enabled: true
  # Use external MongoDB if enabled is false
  external:
    url: ""

  image:
    repository: mongo
    tag: "6"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 27017

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  persistence:
    enabled: true
    size: 20Gi
    accessMode: ReadWriteOnce
    mountPath: /data/db

  auth:
    enabled: false
    rootUsername: ""
    rootPassword: ""

  # MongoDB configuration
  config:
    # Replica set name (leave empty for standalone)
    replicaSetName: ""

# =============================================================================
# QDRANT VECTOR DATABASE (for AI)
# =============================================================================
qdrant:
  enabled: true

  image:
    repository: qdrant/qdrant
    tag: "v1.7.4"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6333
    grpcPort: 6334

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    mountPath: /qdrant/storage

# =============================================================================
# REDIS CONFIGURATION (Optional - for caching/sessions)
# =============================================================================
redis:
  enabled: false

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6379

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: false
    size: 5Gi

# =============================================================================
# SERVICE ACCOUNT
# =============================================================================
serviceAccount:
  create: true
  name: ""
  annotations: {}

# =============================================================================
# POD SECURITY
# =============================================================================
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

# =============================================================================
# NETWORK POLICIES
# =============================================================================
networkPolicy:
  enabled: false

# =============================================================================
# POD DISRUPTION BUDGET
# =============================================================================
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
